# MacroGears ZMK Configuration
CONFIG_ZMK_KEYBOARD_NAME="MacroGears"

# Bluetooth
CONFIG_BT=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_ZMK_BLE=y

# Auto sleep after 10 minutes (600000 ms)
CONFIG_ZMK_IDLE_TIMEOUT=10000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000
CONFIG_ZMK_SLEEP=y

# Deep sleep power savings
CONFIG_ZMK_PM_SOFT_OFF=y

# USB
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y